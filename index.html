<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Avtomatik davomat | Yuz tanish</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: #0c0f1e;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 24px;
            transition: all 0.2s;
        }
        h2 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #111;
        }
        .sub {
            color: #4b5563;
            margin-bottom: 20px;
            border-left: 3px solid #2563eb;
            padding-left: 12px;
        }
        video {
            width: 100%;
            border-radius: 24px;
            background: #000;
            border: 2px solid #e2e8f0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .status-panel {
            margin-top: 20px;
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
        }
        #status {
            font-weight: 600;
            font-size: 1rem;
            padding: 10px;
            border-radius: 40px;
            background: white;
            text-align: center;
        }
        .success {
            background: #dcfce7;
            color: #15803d;
            border-left: 4px solid #22c55e;
        }
        .error {
            background: #fee2e2;
            color: #b91c1c;
            border-left: 4px solid #ef4444;
        }
        .info {
            background: #e0f2fe;
            color: #0369a1;
            border-left: 4px solid #0ea5e9;
        }
        .log-box {
            background: #0f172a;
            color: #a5f3c3;
            font-family: 'Monaco', monospace;
            font-size: 12px;
            padding: 12px;
            border-radius: 20px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        button {
            background: #1e293b;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.96);
            background: #0f172a;
        }
        hr {
            margin: 18px 0;
            border-color: #e2e8f0;
        }
        .badge {
            font-size: 14px;
            background: #e6f0ff;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>📸 Avtomatik davomat</h2>
    <div class="sub">✅ Yuz tashigan zahoti <strong>"keldi"</strong> deb belgilanadi — tugma kerak emas</div>

    <video id="video" width="640" height="480" autoplay muted playsinline></video>

    <div class="status-panel">
        <div id="status">⚙️ Modellar yuklanmoqda...</div>
        <button id="resetBtn">🔄 Qayta boshlash</button>
    </div>

    <div class="log-box" id="logArea">
        📌 [Sistema] Yuklash boshlandi<br>
    </div>
    <div class="badge">🤖 face-api.js | real-time recognition</div>
</div>

<!-- face-api.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
    // ---------- SOZLAMALAR ----------
    const BACKEND_URL = "/api/attendance";   // 👉 O‘Z BACKENDINGIZ URL bilan almashtiring
    const CHECK_INTERVAL_MS = 1800;          // har 1.8 sekundda yuz tekshiriladi
    let intervalId = null;
    let lastMarkedUserId = null;              // bir marta belgilangan foydalanuvchi
    let video = document.getElementById('video');
    let statusDiv = document.getElementById('status');
    let logDiv = document.getElementById('logArea');

    // 📝 log yozish (xato yoki normal)
    function addLog(msg, isError = false) {
        const p = document.createElement('div');
        p.textContent = `🕒 ${new Date().toLocaleTimeString()}  →  ${msg}`;
        p.style.color = isError ? '#ffb4b4' : '#b9f5d8';
        p.style.marginBottom = '5px';
        p.style.fontSize = '12px';
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        console.log(msg);
    }

    function setStatusMessage(text, type = 'info') {
        statusDiv.innerHTML = text;
        statusDiv.className = type; // success, error, info
        addLog(text, type === 'error');
    }

    // ------------------------------------------------------------
    // 📤 "Keldi" ma'lumotini serverga yuborish (avtomatik)
    // ------------------------------------------------------------
    async function sendAttendance(userId, userName) {
        try {
            addLog(`📡 Avtomatik yuborish: ${userName} (ID: ${userId}) -> status: keldi`);

            const payload = {
                userId: userId,
                name: userName,
                status: "keldi",
                timestamp: new Date().toISOString(),
                source: "face-recognition"
            };

            // backendga so‘rov
            const response = await fetch(BACKEND_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            // MUHIM: JSON parse xatosini oldini olish
            const rawText = await response.text();
            let serverData = null;
            try {
                serverData = JSON.parse(rawText);
            } catch (e) {
                // agar javob HTML yoki matn bo‘lsa
                throw new Error(`Server JSON qaytarmadi: ${rawText.slice(0, 100)}`);
            }

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${serverData.message || 'server xatosi'}`);
            }

            setStatusMessage(`✅ ${userName} muvaffaqiyatli "keldi" deb belgilandi`, 'success');
            addLog(`✅ Javob: ${JSON.stringify(serverData)}`);
            return true;
        } catch (err) {
            console.error("Belgilash xatosi:", err);
            setStatusMessage(`❌ Avtomatik yuborishda xatolik: ${err.message}`, 'error');
            addLog(`❌ Xato: ${err.message}`, true);
            return false;
        }
    }

    // ------------------------------------------------------------
    // 🧠 Yuzlarni tanish va moslikni topish (demo + real descriptor)
    // ------------------------------------------------------------
    // Sizning tanilgan shaxslaringiz (descriptorlar SAQLANADI)
    // 🔥 BUNI O‘ZGARTIRING: O‘z foydalanuvchilaringizni qo‘shing
    // Descriptorlar 128 ta float raqamdan iborat. Bu yerda demo ma'lumotlar.
    // REALDA: siz ularni backenddan yoki localStorage dan olasiz.
    let knownUsers = [];  // [{ id, name, descriptor: Float32Array }]

    // *** Yordamchi: yangi yuzni ro‘yxatga olish (birinchi marta) ***
    // Soddalik uchun: agar hech kim tanilmasa, "Yangi mehmon" deb qo‘shib qo‘yamiz?
    // Lekin siz oldindan ma'lumotlar bazasiga ega bo‘lishingiz kerak.
    // Keling, demo sifatida ikkita test user qo‘shamiz (faqat tushuncha uchun).
    // ASLIDA siz real descriptorlarni yuklashingiz lozim.

    async function loadKnownUsersFromBackend() {
        try {
            addLog("🔄 Backenddan taniqli yuzlar yuklanmoqda...");
            // Agar backendda /api/faces mavjud bo‘lsa – ishlat, bo‘lmasa local demo
            // demo uchun hech qanday xatolik chiqmasligi uchun bo‘sh massiv qaytaramiz
            // SIZ BU QISMNI REAL BACKENDGA MOSLAB O‘ZGARTIRING
            /*
            const resp = await fetch('/api/faces');
            if (resp.ok) {
                const usersArr = await resp.json();
                knownUsers = usersArr.map(u => ({
                    id: u.id,
                    name: u.name,
                    descriptor: new Float32Array(u.descriptor)
                }));
                addLog(`✅ ${knownUsers.length} ta shaxs yuklandi`);
                return;
            }
            */
            // DEMO MA'LUMOTLAR (SIZ O‘ZINGIZNINGLARINGIZNI QO‘SHING)
            // Eslatma: real descriptorlar 128 o‘lchamli bo‘ladi.
            // Quyidagilar faqatgina tizim yaxshi ishlashi uchun "bo‘sh" namuna.
            // Agar sizda haqiqiy descriptorlar bo‘lsa, ularni yuklang.
            knownUsers = [];  // agar backend bo‘lmasa, hech kim tanilmaydi.
            // Istasangiz, quyidagi qatorni o‘chirib tashlang:
            addLog("⚠️ Hozircha backenddan yuz ma'lumotlari yuklanmagan. Hech kim tanilmaydi.", false);
        } catch (e) {
            addLog(`⚠️ Yuzlar yuklashda xatolik: ${e.message}`, true);
            knownUsers = [];
        }
    }

    // 🔍 Tanilgan foydalanuvchini qidirish (eng yaqin masofa)
    async function findMatchingUser(faceDescriptor) {
        if (!knownUsers.length) {
            // hech kim tanilmagan, demo uchun hech narsa qaytarmaymiz
            return null;
        }
        let bestMatch = null;
        let bestDistance = 0.55;  // chegaraviy qiymat (0.6 dan kichik bo‘lsa o‘xshash)
        for (let user of knownUsers) {
            if (!user.descriptor) continue;
            const distance = faceapi.euclideanDistance(faceDescriptor, user.descriptor);
            if (distance < bestDistance) {
                bestDistance = distance;
                bestMatch = user;
            }
        }
        if (bestMatch) {
            addLog(`🎯 Tanildi: ${bestMatch.name} (masofa: ${bestDistance.toFixed(3)})`);
        }
        return bestMatch;
    }

    // ------------------------------------------------------------
    // 🎥 Asosiy tanish funksiyasi (intervalda ishlaydi)
    // ------------------------------------------------------------
    async function detectFaceAndAutoMark() {
        if (!video || video.paused || video.ended || !video.videoWidth) {
            return;
        }

        try {
            // yuzlarni deteksiya qilish (tezlik uchun tinyFaceDetector)
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptors();

            if (detections.length === 0) {
                // hech kim yo‘q
                return;
            }

            // birinchi yuzni olamiz
            const descriptor = detections[0].descriptor;
            const matchedUser = await findMatchingUser(descriptor);

            if (matchedUser && matchedUser.id !== lastMarkedUserId) {
                // Avtomatik belgilash (faqat bir marta)
                lastMarkedUserId = matchedUser.id;
                setStatusMessage(`🔔 ${matchedUser.name} aniqlandi → avtomatik "keldi" yuborilmoqda...`, 'info');
                await sendAttendance(matchedUser.id, matchedUser.name);
            } else if (matchedUser && matchedUser.id === lastMarkedUserId) {
                // allaqachon belgilangan, qayta yubormaymiz
                // statusni bezovta qilmaymiz
            } else {
                // tanilmagan yuz
                if (detections.length > 0 && knownUsers.length > 0) {
                    setStatusMessage("👤 Tanilmagan yuz, ro‘yxatdan o‘tkazilmagan", 'info');
                }
            }
        } catch (err) {
            console.error("detectFace error:", err);
            addLog(`⚠️ Tanish vaqtida xatolik: ${err.message}`, true);
        }
    }

    // ------------------------------------------------------------
    // 🚀 Kamera va modellarni ishga tushirish
    // ------------------------------------------------------------
    async function initCameraAndModels() {
        setStatusMessage("📦 Yuz modellari yuklanmoqda... (Internet kerak)", 'info');
        try {
            // face-api.js modellari (eng tez variant)
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            addLog("✅ Barcha modellar muvaffaqiyatli yuklandi");
        } catch (err) {
            setStatusMessage("❌ Modellarni yuklashda xatolik! Internet aloqasini tekshiring.", 'error');
            addLog(`❌ Model xatosi: ${err.message}`, true);
            return false;
        }

        // Kamera ruxsati
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            setStatusMessage("📷 Kamera ishlamoqda. Yuz tanish avtomatik tarzda ishga tushadi.", 'success');
            addLog("Kamera yoqildi, interval boshlandi.");
            return true;
        } catch (err) {
            setStatusMessage("❌ Kameraga ruxsat berilmadi yoki xato: " + err.message, 'error');
            addLog(`❌ Kamera xatosi: ${err.message}`, true);
            return false;
        }
    }

    // ------------------------------------------------------------
    // 🔄 To‘liq tizimni ishga tushirish
    // ------------------------------------------------------------
    async function startSystem() {
        if (intervalId) clearInterval(intervalId);
        lastMarkedUserId = null;

        // Taniqli foydalanuvchilarni yuklash (backend yoki local)
        await loadKnownUsersFromBackend();

        const cameraReady = await initCameraAndModels();
        if (!cameraReady) return;

        // interval bilan yuz tekshiruvi
        intervalId = setInterval(() => {
            detectFaceAndAutoMark();
        }, CHECK_INTERVAL_MS);
    }

    // reset tugmasi
    document.getElementById('resetBtn').addEventListener('click', async () => {
        if (intervalId) clearInterval(intervalId);
        if (video.srcObject) {
            let tracks = video.srcObject.getTracks();
            tracks.forEach(t => t.stop());
        }
        lastMarkedUserId = null;
        addLog("🔄 Tizim qayta ishga tushirilmoqda...");
        setStatusMessage("♻️ Qayta boshlash...", 'info');
        await startSystem();
    });

    // Start!
    startSystem();
</script>
</body>
</html>
