<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avtomatik davomat | Yuz tanish</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f1c;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 24px;
        }
        h2 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        video {
            width: 100%;
            border-radius: 24px;
            background: #000;
            border: 2px solid #ddd;
            transform: scaleX(-1); /* oyna effekti */
        }
        .status-card {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 16px;
            margin: 20px 0;
        }
        #status {
            font-weight: bold;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            background: white;
        }
        .success {
            background: #dcfce7;
            color: #166534;
            border-left: 5px solid #22c55e;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 5px solid #ef4444;
        }
        .info {
            background: #dbeafe;
            color: #1e40af;
            border-left: 5px solid #3b82f6;
        }
        .log {
            background: #0f172a;
            color: #bbf7d0;
            font-family: monospace;
            padding: 14px;
            border-radius: 20px;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
        button {
            background: #1e293b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
            margin-top: 12px;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.96);
        }
        .flex {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        input {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #ccc;
            flex: 1;
            min-width: 150px;
        }
        hr {
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📸 Avtomatik davomat tizimi</h2>
    <p>✅ Yuz aniqlanganda <strong>hech qanday tugma bosmasdan</strong> "keldi" deb belgilanadi.</p>

    <video id="video" width="640" height="480" autoplay muted playsinline></video>

    <div class="status-card">
        <div id="status">⚙️ Modellar yuklanmoqda...</div>
        <div class="flex">
            <input type="text" id="userName" placeholder="Ismingiz" autocomplete="off">
            <button id="registerBtn">📝 Yuzimni ro‘yxatdan o‘tkazish</button>
            <button id="resetBtn">🔄 Qayta ishga tushirish</button>
        </div>
    </div>

    <div class="log" id="logArea">
        🟢 Tizim ishga tushmoqda...<br>
    </div>
    <small>📌 Bir marta ro‘yxatdan o‘tsangiz, keyingi safar yuzingiz avtomatik tanilinadi.</small>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
    // ------------------- SOZLAMALAR -------------------
    const BACKEND_URL = "/api/attendance";   // O‘z backend manzilingiz (agar bo‘lmasa, konsolga yozadi)
    const CHECK_INTERVAL = 2000;             // har 2 sekundda tekshiradi
    let recognitionInterval = null;
    let lastMarkedId = null;                 // bir marta belgilangan odam

    let video = document.getElementById('video');
    let statusDiv = document.getElementById('status');
    let logDiv = document.getElementById('logArea');
    let userNameInput = document.getElementById('userName');
    let registerBtn = document.getElementById('registerBtn');
    let resetBtn = document.getElementById('resetBtn');

    // Ro‘yxatdagi taniqli yuzlar (localStorage da saqlanadi)
    let knownUsers = [];  // [{ id, name, descriptor: Float32Array }]

    // ---------- LOG va STATUS ----------
    function addLog(msg, isError = false) {
        const line = document.createElement('div');
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        line.style.color = isError ? '#ffb4b4' : '#b9f5d8';
        line.style.marginBottom = '6px';
        logDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        console.log(msg);
    }

    function setStatus(msg, type = 'info') {
        statusDiv.innerHTML = msg;
        statusDiv.className = type;
        addLog(msg, type === 'error');
    }

    // ---------- YUZLARNI LOCALSTORAGE GA SAQLASH VA YUKLASH ----------
    function saveKnownUsers() {
        // Descriptorlarni oddiy arrayga aylantirib saqlaymiz
        const toSave = knownUsers.map(u => ({
            id: u.id,
            name: u.name,
            descriptor: Array.from(u.descriptor)
        }));
        localStorage.setItem('face_users', JSON.stringify(toSave));
        addLog(`💾 ${knownUsers.length} ta foydalanuvchi saqlandi`);
    }

    function loadKnownUsers() {
        const raw = localStorage.getItem('face_users');
        if (!raw) {
            knownUsers = [];
            addLog("📂 Hech qanday ro‘yxatdan o‘tgan yuz yo‘q.");
            return;
        }
        try {
            const loaded = JSON.parse(raw);
            knownUsers = loaded.map(u => ({
                id: u.id,
                name: u.name,
                descriptor: new Float32Array(u.descriptor)
            }));
            addLog(`✅ ${knownUsers.length} ta foydalanuvchi yuklandi: ${knownUsers.map(u=>u.name).join(', ')}`);
        } catch(e) {
            knownUsers = [];
            addLog("⚠️ Yuzlar yuklanmadi: xatolik", true);
        }
    }

    // ---------- YUZNI RO‘YXATGA OLISH ----------
    async function registerFace() {
        const name = userNameInput.value.trim();
        if (!name) {
            setStatus("❌ Iltimos, ismingizni yozing!", 'error');
            return;
        }
        setStatus("📸 Yuzingiz aniqlanmoqda... bir oz turing", 'info');
        
        // Hozirgi videodan yuzlarni olish
        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptors();
        
        if (detections.length === 0) {
            setStatus("❌ Hech qanday yuz topilmadi. Kameraga to‘g‘ri qarang!", 'error');
            return;
        }
        
        const descriptor = detections[0].descriptor;
        const newId = `user_${Date.now()}`;
        knownUsers.push({
            id: newId,
            name: name,
            descriptor: descriptor
        });
        saveKnownUsers();
        setStatus(`✅ ${name} muvaffaqiyatli ro‘yxatdan o‘tdi! Endi yuzingiz avtomatik tanilinadi.`, 'success');
        userNameInput.value = '';
    }

    // ---------- TANILGAN FOYDALANUVCHINI QIDIRISH ----------
    async function findMatchedUser(descriptor) {
        if (knownUsers.length === 0) return null;
        let bestMatch = null;
        let bestDistance = 0.55;  // chegara – 0.55 dan past bo‘lsa o‘xshash
        for (let user of knownUsers) {
            const dist = faceapi.euclideanDistance(descriptor, user.descriptor);
            if (dist < bestDistance) {
                bestDistance = dist;
                bestMatch = user;
            }
        }
        if (bestMatch) {
            addLog(`🔍 Tanildi: ${bestMatch.name} (masofa: ${bestDistance.toFixed(3)})`);
        }
        return bestMatch;
    }

    // ---------- "KELDI" MA'LUMOTINI YUBORISH (BACKEND YOKI KONSOLE) ----------
    async function markAttendance(user) {
        if (lastMarkedId === user.id) {
            // allaqachon belgilangan, qayta yubormaymiz
            return;
        }
        
        setStatus(`📤 ${user.name} uchun avtomatik "keldi" yuborilmoqda...`, 'info');
        addLog(`👉 ${user.name} (${user.id}) → status: keldi`);
        
        // Agar backend URL berilgan bo‘lsa, yuboramiz
        if (BACKEND_URL && BACKEND_URL !== "/api/attendance") { 
            try {
                const payload = {
                    userId: user.id,
                    name: user.name,
                    status: "keldi",
                    timestamp: new Date().toISOString()
                };
                const resp = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const text = await resp.text();
                let json = null;
                try { json = JSON.parse(text); } catch(e) {}
                if (!resp.ok) throw new Error(json?.message || text.slice(0,100));
                setStatus(`✅ ${user.name} muvaffaqiyatli "keldi" deb belgilandi`, 'success');
                addLog(`✅ Server javobi: OK`);
                lastMarkedId = user.id;
            } catch(err) {
                setStatus(`❌ Xatolik: ${err.message}`, 'error');
                addLog(`❌ Yuborishda xato: ${err.message}`, true);
            }
        } else {
            // Demo rejimi – faqat konsolga yozamiz
            setStatus(`✅ ${user.name} ("keldi") – DEMO rejimida belgilandi`, 'success');
            addLog(`✅ ${user.name} uchun "keldi" qayd etildi (backend yo‘q)`);
            lastMarkedId = user.id;
        }
    }

    // ---------- ASOSIY TANISH FUNKSIYASI (INTERVAL) ----------
    async function detectAndAutoMark() {
        if (!video || video.paused || video.ended || !video.videoWidth) return;
        
        try {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptors();
            
            if (detections.length === 0) return;
            
            const descriptor = detections[0].descriptor;
            const matched = await findMatchedUser(descriptor);
            
            if (matched) {
                await markAttendance(matched);
            } else {
                // tanilmagan yuz
                if (knownUsers.length > 0) {
                    setStatus("👤 Tanilmagan yuz. Iltimos, avval ro‘yxatdan o‘ting.", 'info');
                }
            }
        } catch(err) {
            console.error("Detect xatosi:", err);
            addLog(`⚠️ Tekshiruv xatosi: ${err.message}`, true);
        }
    }

    // ---------- MODELLARNI YUKLASH VA KAMERANI ISHGA TUSHIRISH ----------
    async function initModelsAndCamera() {
        setStatus("📦 Yuz tanish modellari yuklanmoqda... (ilk marotaba internet kerak)", 'info');
        // TO‘G‘RI MODEL MANZILI (github raw – ishlaydi)
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            addLog("✅ Barcha modellar yuklandi");
        } catch(err) {
            setStatus("❌ Modellarni yuklashda xatolik! Internetni tekshiring.", 'error');
            addLog(`❌ Model xatosi: ${err.message}`, true);
            return false;
        }
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            setStatus("📷 Kamera ishlayapti. Yuzingizni ro‘yxatdan o‘tkazing yoki tanish avtomatik ishlaydi.", 'success');
            addLog("Kamera yoqildi.");
            return true;
        } catch(err) {
            setStatus("❌ Kameraga ruxsat berilmadi: " + err.message, 'error');
            addLog(`❌ Kamera xatosi: ${err.message}`, true);
            return false;
        }
    }

    // ---------- TIZIMNI BOSHLASH ----------
    async function startSystem() {
        if (recognitionInterval) clearInterval(recognitionInterval);
        lastMarkedId = null;
        loadKnownUsers();  // localStorage dan o‘qish
        
        const ok = await initModelsAndCamera();
        if (!ok) return;
        
        recognitionInterval = setInterval(() => {
            detectAndAutoMark();
        }, CHECK_INTERVAL);
    }

    // ---------- QAYTA BOSHLASH ----------
    async function resetSystem() {
        if (recognitionInterval) clearInterval(recognitionInterval);
        if (video.srcObject) {
            let tracks = video.srcObject.getTracks();
            tracks.forEach(t => t.stop());
        }
        lastMarkedId = null;
        setStatus("♻️ Qayta ishga tushirilmoqda...", 'info');
        addLog("🔄 Tizim qayta tiklandi");
        await startSystem();
    }

    // Event listenerlar
    registerBtn.addEventListener('click', registerFace);
    resetBtn.addEventListener('click', resetSystem);
    
    // Boshlash
    startSystem();
</script>
</body>
</html>
