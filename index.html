<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O‘qituvchilar | Avtomatik davomat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #eef2f7; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 2rem; padding: 1.5rem; }
        .two-cols { display: flex; flex-wrap: wrap; gap: 2rem; }
        .camera-area { flex: 1.5; background: #f8fafc; border-radius: 1.5rem; padding: 1rem; }
        .video-wrapper { background: #000; border-radius: 1rem; overflow: hidden; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info-area { flex: 1; background: white; border-radius: 1.5rem; padding: 1rem; border: 1px solid #e4edf2; }
        button { background: #2c7da0; border: none; padding: 8px 18px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .teacher-card { background: #f1f5f9; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        .attendance-list { max-height: 300px; overflow-y: auto; margin-top: 1rem; }
        .attendance-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #ddd; align-items: center; }
        .badge-present { background: #28a745; color: white; padding: 2px 8px; border-radius: 20px; }
        .badge-absent { background: #dc3545; color: white; padding: 2px 8px; border-radius: 20px; }
        .badge-late { background: #ffc107; color: #333; padding: 2px 8px; border-radius: 20px; }
        .time-badge { background: #6c757d; color: white; padding: 2px 6px; border-radius: 20px; font-size: 0.7rem; margin-left: 8px; }
        .status-panel { background: #eef2fa; border-radius: 1rem; padding: 0.5rem; margin: 0.5rem 0; font-size: 0.8rem; }
        .refresh-btn { background: #6c757d; }
        .close-btn { background: #dc3545; }
        footer { text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #5f7f9a; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
<div class="container">
    <h1>🧑‍🏫 O‘qituvchilar – avtomatik davomat</h1>
    <div class="two-cols">
        <div class="camera-area">
            <div class="video-wrapper"><video id="video" autoplay playsinline muted></video></div>
            <div class="status-panel" id="statusMsg">⏳ Modellar yuklanmoqda...</div>
            <button id="startCamBtn">🎥 Kamerani yoqish</button>
            <button id="refreshBtn" class="refresh-btn">🔄 Bazani yangilash</button>
            <button id="closeDayBtn" class="close-btn">🔒 Bazani yopish (admin)</button>
        </div>
        <div class="info-area">
            <h3>✅ Tanilgan o‘qituvchi</h3>
            <div id="recogResult">🤷‍♂️ Hech kim tanilmadi</div>
            <h3>📅 Bugungi davomat <span id="closedBadge"></span></h3>
            <div id="attendanceList" class="attendance-list">Yuklanmoqda...</div>
        </div>
    </div>
    <footer>⚡ Yuz tanilganda avtomatik “Keldi” belgilanadi (vaqt bilan). Kech kelganlar 09:00 dan keyin belgilanadi.</footer>
</div>

<script>
    // ================= KONFIGURATSIYA =================
    const LATE_TIME = "09:00:00";
    const ADMIN_CHAT_ID = "7702180390";

    // ================= DOM ELEMENTLARI =================
    const video = document.getElementById('video');
    const startCamBtn = document.getElementById('startCamBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const closeDayBtn = document.getElementById('closeDayBtn');
    const statusDiv = document.getElementById('statusMsg');
    const recogResultDiv = document.getElementById('recogResult');
    const attendanceListDiv = document.getElementById('attendanceList');
    const closedBadgeSpan = document.getElementById('closedBadge');

    let currentStream = null;
    let modelsLoaded = false;
    let teachersDB = [];
    let enrolledFaces = [];      // { descriptor, teacher }
    let recognitionInterval = null;

    // ================= YORDAMCHI FUNKSIYALAR =================
    function getTodayKey() { return new Date().toISOString().slice(0,10); }

    function loadAttendance() {
        const stored = localStorage.getItem('teachers_attendance');
        if(stored) {
            try { return JSON.parse(stored); } catch(e) { return {}; }
        }
        return {};
    }

    function saveAttendance(att) {
        localStorage.setItem('teachers_attendance', JSON.stringify(att));
    }

    function isTodayClosed() {
        const att = loadAttendance();
        const today = getTodayKey();
        return att[today] && att[today]._closed === true;
    }

    // ================= DAVOMAT JADVALINI KO‘RSATISH =================
    function renderAttendance() {
        const today = getTodayKey();
        const att = loadAttendance();
        const todayData = att[today] || {};
        const isClosed = todayData._closed === true;
        if (isClosed) {
            closedBadgeSpan.innerHTML = '<span style="background:#6c757d; padding:2px 8px; border-radius:20px; font-size:0.7rem;">✅ Baza yopilgan</span>';
        } else {
            closedBadgeSpan.innerHTML = '';
        }

        if (teachersDB.length === 0) {
            attendanceListDiv.innerHTML = '<div>Hali o‘qituvchilar bazasi yuklanmagan.</div>';
            return;
        }

        let html = '';
        teachersDB.forEach(teacher => {
            const record = todayData[teacher.id];
            const isPresent = !!record;
            let timeStr = '', isLate = false, statusText = '';
            if (isPresent) {
                timeStr = record.time || '';
                isLate = timeStr > LATE_TIME;
                statusText = isLate ? `Kech keldi (${timeStr})` : `Keldi (${timeStr})`;
            } else {
                statusText = 'Kelmagan';
            }
            const badgeClass = isPresent ? (isLate ? 'badge-late' : 'badge-present') : 'badge-absent';
            html += `
                <div class="attendance-item">
                    <div>
                        <b>${teacher.firstname} ${teacher.lastname}</b> (${teacher.phone})
                        ${isPresent ? `<span class="time-badge">⏰ ${timeStr}</span>` : ''}
                        ${isPresent && isLate ? `<span class="time-badge" style="background:#ff9800;">⚠️ Kech</span>` : ''}
                    </div>
                    <span class="${badgeClass}">${statusText}</span>
                </div>
            `;
        });
        attendanceListDiv.innerHTML = html;
    }

    // ================= AVTOMATIK "KELDI" BELGILASH =================
    function autoMarkAttendance(teacher) {
        if (isTodayClosed()) {
            console.log("Bugun baza yopilgan, belgilash mumkin emas");
            return false;
        }
        const today = getTodayKey();
        let att = loadAttendance();
        if (!att[today]) att[today] = {};
        if (att[today][teacher.id]) return false; // allaqachon belgilangan

        const now = new Date();
        const timeStr = now.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        att[today][teacher.id] = { time: timeStr, timestamp: now.toISOString() };
        saveAttendance(att);
        renderAttendance();
        return true;
    }

    // ================= HISOBOT MATNINI TAYYORLASH =================
    function formatReport(teachers, attendance) {
        const today = getTodayKey();
        const todayData = attendance[today] || {};
        const isClosed = todayData._closed === true;
        let report = `📊 *${today} kunlik davomat hisoboti*\n`;
        report += isClosed ? "🔒 *Baza yopilgan* (yakuniy)\n\n" : "🟡 *Baza hali yopilmagan*\n\n";
        
        let presentList = [], absentList = [], lateList = [];
        teachers.forEach(teacher => {
            const record = todayData[teacher.id];
            const fullName = `${teacher.firstname} ${teacher.lastname}`;
            const phone = teacher.phone;
            if (record) {
                const timeStr = record.time || '';
                const isLate = timeStr > LATE_TIME;
                const entry = `• ${fullName} (${phone}) – kelgan vaqt: ${timeStr}`;
                if (isLate) lateList.push(entry + " ⚠️ (kech)");
                else presentList.push(entry);
            } else {
                absentList.push(`• ${fullName} (${phone})`);
            }
        });
        report += `✅ *Kelganlar* (${presentList.length}):\n` + (presentList.join("\n") || "Hech kim kelmagan") + "\n\n";
        if (lateList.length) report += `⚠️ *Kech kelganlar* (${lateList.length}):\n` + lateList.join("\n") + "\n\n";
        report += `❌ *Kelmaganlar* (${absentList.length}):\n` + (absentList.join("\n") || "Hamma kelgan") + "\n";
        return report;
    }

    // ================= TELEGRAM BOTGA HISOBOT YUBORISH =================
    async function sendReportToTelegram(message) {
        try {
            const response = await fetch('/api/send-report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatId: ADMIN_CHAT_ID, message: message })
            });
            const result = await response.json();
            if (result.success) {
                alert("✅ Hisobot Telegram botga yuborildi!");
                return true;
            } else {
                alert("❌ Xatolik: " + (result.error || "Noma'lum xato"));
                return false;
            }
        } catch (err) {
            console.error(err);
            alert("❌ Hisobot yuborishda xatolik: " + err.message);
            return false;
        }
    }

    // ================= BAZANI YOPISH =================
    async function closeDay() {
        if (isTodayClosed()) {
            alert("Bugungi baza allaqachon yopilgan!");
            return;
        }
        if (!confirm("Bugungi davomatni yakunlab, bazani yopishni xohlaysizmi? Hisobot admin Telegram chatiga yuboriladi.")) return;

        const today = getTodayKey();
        let att = loadAttendance();
        if (!att[today]) att[today] = {};
        att[today]._closed = true;
        saveAttendance(att);
        renderAttendance();

        // Hisobot matnini tayyorlash va yuborish
        const report = formatReport(teachersDB, loadAttendance());
        await sendReportToTelegram(report);
    }

    // ================= YUZ TANISH FUNKSIYALARI =================
    async function loadModels() {
        statusDiv.innerHTML = "📥 Yuz modellari yuklanmoqda...";
        try {
            await faceapi.nets.ssdMobilenetv1.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
            modelsLoaded = true;
            statusDiv.innerHTML = "✅ Modellar yuklandi. O‘qituvchilar bazasi yuklanmoqda...";
            await loadTeachersAndEnroll();
        } catch(err) {
            statusDiv.innerHTML = "❌ Modellarni yuklashda xatolik! Internetni tekshiring.";
        }
    }

    async function loadTeachersAndEnroll() {
        const stored = localStorage.getItem('teachers_db');
        if (!stored) {
            statusDiv.innerHTML = "⚠️ Hech qanday o‘qituvchi topilmadi. Avval ma’lumot kiritish sahifasiga o‘ting.";
            teachersDB = []; enrolledFaces = []; renderAttendance(); return;
        }
        try { teachersDB = JSON.parse(stored); } catch(e) { teachersDB = []; }
        if (!teachersDB.length) {
            statusDiv.innerHTML = "⚠️ O‘qituvchilar bazasi bo‘sh.";
            enrolledFaces = []; renderAttendance(); return;
        }
        statusDiv.innerHTML = `👥 ${teachersDB.length} nafar o‘qituvchi topildi. Yuz vektorlari hisoblanmoqda...`;
        enrolledFaces = [];
        for (let teacher of teachersDB) {
            if (!teacher.imageBase64) continue;
            try {
                const img = await loadImageFromBase64(teacher.imageBase64);
                const detection = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                if (detection && detection.descriptor) {
                    enrolledFaces.push({ descriptor: detection.descriptor, teacher: teacher });
                }
            } catch(e) { console.warn(teacher.firstname, e); }
        }
        statusDiv.innerHTML = `✅ Tayyor! ${enrolledFaces.length} / ${teachersDB.length} o‘qituvchi tanishga tayyor.`;
        renderAttendance();
        if (currentStream) startRecognitionLoop();
    }

    function loadImageFromBase64(base64) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = base64;
        });
    }

    async function recognizeFromVideo() {
        if (!modelsLoaded || !currentStream || video.readyState !== 4 || enrolledFaces.length === 0) return;
        try {
            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            if (detections.length === 0) {
                recogResultDiv.innerHTML = "🤔 Yuz aniqlanmadi";
                return;
            }
            let bestMatch = null;
            let bestDistance = 0.68;
            for (let face of detections) {
                for (let enrolled of enrolledFaces) {
                    const dist = faceapi.euclideanDistance(face.descriptor, enrolled.descriptor);
                    if (dist < bestDistance) {
                        bestDistance = dist;
                        bestMatch = enrolled.teacher;
                    }
                }
            }
            if (bestMatch) {
                const confidence = Math.floor((1 - bestDistance) * 100);
                recogResultDiv.innerHTML = `
                    <div class="teacher-card">
                        <b>${bestMatch.firstname} ${bestMatch.lastname}</b><br>
                        📞 ${bestMatch.phone}<br>
                        🧑‍🏫 Fan: ${bestMatch.subject || '-'}<br>
                        🎯 Ishonchlilik: ${confidence}%
                    </div>
                `;
                // Avtomatik "keldi" belgilash
                const marked = autoMarkAttendance(bestMatch);
                if (marked) {
                    statusDiv.innerHTML = `✅ ${bestMatch.firstname} ${bestMatch.lastname} avtomatik keldi deb belgilandi! Vaqt: ${new Date().toLocaleTimeString()}`;
                    setTimeout(() => { statusDiv.innerHTML = `✅ Tayyor! ${enrolledFaces.length} / ${teachersDB.length} o‘qituvchi tanishga tayyor.`; }, 3000);
                }
            } else {
                recogResultDiv.innerHTML = "❌ Hech qanday moslik topilmadi";
            }
        } catch(err) { console.warn(err); }
    }

    // ================= KAMERA VA LOOP =================
    async function startCamera() {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            currentStream = stream;
            video.srcObject = stream;
            await video.play();
            startCamBtn.textContent = "🔄 Kamera qayta yoqildi";
            if (modelsLoaded && enrolledFaces.length) startRecognitionLoop();
        } catch(err) { alert("Kamera xatosi"); }
    }

    function startRecognitionLoop() {
        if (recognitionInterval) clearInterval(recognitionInterval);
        recognitionInterval = setInterval(async () => { await recognizeFromVideo(); }, 800);
    }

    function stopTracks() {
        if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
        if (recognitionInterval) { clearInterval(recognitionInterval); recognitionInterval = null; }
        video.srcObject = null;
    }

    async function refreshData() {
        if (!modelsLoaded) { alert("Modellar yuklanmoqda, kuting..."); return; }
        statusDiv.innerHTML = "🔄 Bazani yangilash...";
        await loadTeachersAndEnroll();
        if (currentStream) startRecognitionLoop();
    }

    // ================= EVENTLAR =================
    startCamBtn.onclick = startCamera;
    refreshBtn.onclick = refreshData;
    closeDayBtn.onclick = closeDay;

    window.onbeforeunload = () => { stopTracks(); };
    loadModels();
</script>
</body>
</html>
