<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O‘qituvchilar | Ma’lumot kiritish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #eef2f7; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 2rem; padding: 1.5rem; }
        .dashboard { display: flex; flex-wrap: wrap; gap: 2rem; }
        .camera-box { flex: 1.2; background: #f8fafc; border-radius: 1.5rem; padding: 1rem; }
        .video-wrapper { background: #000; border-radius: 1rem; overflow: hidden; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn-group { display: flex; gap: 10px; margin: 1rem 0; flex-wrap: wrap; }
        button { background: #2c7da0; border: none; padding: 8px 18px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; }
        .form-box { flex: 2; background: white; border-radius: 1.5rem; padding: 1rem; border: 1px solid #e4edf2; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 1rem; }
        .input-field { display: flex; flex-direction: column; gap: 4px; }
        .input-field label { font-weight: 600; font-size: 0.8rem; }
        input, textarea { padding: 8px; border-radius: 1rem; border: 1px solid #cbdbe6; }
        .teacher-list { max-height: 400px; overflow-y: auto; margin-top: 1rem; }
        .teacher-card { background: #fff; border-radius: 1rem; padding: 0.8rem; display: flex; gap: 1rem; margin-bottom: 0.5rem; border: 1px solid #dfe8f0; align-items: center; }
        .teacher-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: #5f7f9a; }
        .required-star { color: #d9534f; }
    </style>
</head>
<body>
<div class="container">
    <h1>👩‍🏫 O‘qituvchilar | Ma’lumot kiritish</h1>
    <div class="dashboard">
        <div class="camera-box">
            <div class="video-wrapper"><video id="video" autoplay playsinline muted></video></div>
            <div class="btn-group">
                <button id="startCamBtn">📷 Kamerani yoqish</button>
                <button id="snapBtn" disabled>📸 Rasmga olish</button>
                <button id="resetImgBtn">🔄 Yangi rasm</button>
            </div>
            <div class="capture-preview"><p>📷 Olingan rasm:</p><img id="previewPhoto" style="max-width:100%; max-height:150px; border-radius:1rem;"></div>
        </div>
        <div class="form-box">
            <h3>📋 O‘qituvchi ma'lumotlari</h3>
            <div class="form-grid">
                <div class="input-field"><label>Ismi *</label><input id="firstname" placeholder="Jasur"></div>
                <div class="input-field"><label>Familiyasi *</label><input id="lastname" placeholder="Aliyev"></div>
                <div class="input-field"><label>Telefon raqami *</label><input id="phone" placeholder="+998 90 123 45 67"></div>
                <div class="input-field"><label>Fan (ixtiyoriy)</label><input id="subject" placeholder="Matematika"></div>
                <div class="input-field"><label>Tug‘ilgan sana</label><input type="date" id="birthdate"></div>
                <div class="input-field"><label>Manzil</label><input id="address" placeholder="Toshkent"></div>
                <div class="input-field"><label>Qo‘shimcha</label><textarea id="notes" rows="2"></textarea></div>
            </div>
            <div class="btn-group">
                <button id="saveTeacherBtn" disabled>💾 Saqlash</button>
                <button id="clearFormBtn">🧹 Tozalash</button>
            </div>
        </div>
    </div>
    <h3>📋 O‘qituvchilar ro‘yxati (<span id="teacherCount">0</span>)</h3>
    <div id="teachersList" class="teacher-list"></div>
    <footer>⚡ O‘qituvchi ma’lumotlari brauzer xotirasida saqlanadi.</footer>
</div>
<script>
    // ---------- DOM ----------
    const video = document.getElementById('video');
    const startCamBtn = document.getElementById('startCamBtn');
    const snapBtn = document.getElementById('snapBtn');
    const resetImgBtn = document.getElementById('resetImgBtn');
    const previewPhoto = document.getElementById('previewPhoto');
    const firstname = document.getElementById('firstname');
    const lastname = document.getElementById('lastname');
    const phone = document.getElementById('phone');
    const subject = document.getElementById('subject');
    const birthdate = document.getElementById('birthdate');
    const address = document.getElementById('address');
    const notes = document.getElementById('notes');
    const saveBtn = document.getElementById('saveTeacherBtn');
    const clearBtn = document.getElementById('clearFormBtn');
    const teachersListDiv = document.getElementById('teachersList');
    const teacherCountSpan = document.getElementById('teacherCount');

    let currentStream = null;
    let currentImageBase64 = null;
    let teachersArray = [];
    let editModeId = null;

    function loadTeachers() {
        const stored = localStorage.getItem('teachers_db');
        if(stored) { try { teachersArray = JSON.parse(stored); } catch(e) { teachersArray = []; } }
        else { teachersArray = []; }
        renderTeacherList();
    }
    function saveToStorage() { localStorage.setItem('teachers_db', JSON.stringify(teachersArray)); }
    function renderTeacherList() {
        teacherCountSpan.innerText = teachersArray.length;
        if(teachersArray.length === 0) { teachersListDiv.innerHTML = '<div style="text-align:center; padding:2rem;">📭 Hech qanday o‘qituvchi yo‘q.</div>'; return; }
        let html = '';
        teachersArray.forEach(t => {
            const fullName = `${t.firstname} ${t.lastname}`;
            const imgSrc = t.imageBase64 || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23bdd4e4%22/%3E%3Ctext x=%2250%22 y=%2270%22 text-anchor=%22middle%22 fill=%22%23333%22 font-size=%2240%22%3E📷%3C/text%3E%3C/svg%3E';
            html += `<div class="teacher-card"><img class="teacher-img" src="${imgSrc}"><div style="flex:1"><b>${fullName}</b><br>📞 ${t.phone}<br>${t.subject ? '📚 '+t.subject : ''}</div><div><button class="edit-btn" data-id="${t.id}" style="background:#6c757d;">✏️</button><button class="delete-btn" data-id="${t.id}" style="background:#dc3545;">🗑</button></div></div>`;
        });
        teachersListDiv.innerHTML = html;
        document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => editTeacher(btn.dataset.id)));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteTeacher(btn.dataset.id)));
    }
    function editTeacher(id) { const t = teachersArray.find(t => t.id === id); if(!t) return; editModeId = id; firstname.value = t.firstname; lastname.value = t.lastname; phone.value = t.phone; subject.value = t.subject; birthdate.value = t.birthdate; address.value = t.address; notes.value = t.notes; currentImageBase64 = t.imageBase64; previewPhoto.src = currentImageBase64; saveBtn.disabled = false; saveBtn.textContent = "✏️ Yangilash"; }
    function deleteTeacher(id) { if(confirm("O‘chirilsinmi?")) { teachersArray = teachersArray.filter(t => t.id !== id); saveToStorage(); renderTeacherList(); if(editModeId === id) resetForm(); } }
    function resetForm() { firstname.value = ''; lastname.value = ''; phone.value = ''; subject.value = ''; birthdate.value = ''; address.value = ''; notes.value = ''; currentImageBase64 = null; previewPhoto.src = ''; saveBtn.disabled = true; editModeId = null; saveBtn.textContent = "💾 Saqlash"; }
    function saveOrUpdate() { if(!firstname.value.trim() || !lastname.value.trim() || !phone.value.trim()) { alert("Ism, familiya va telefon raqami majburiy!"); return; } if(!currentImageBase64) { alert("Rasm oling!"); return; } const data = { id: editModeId || Date.now()+'-'+Math.random().toString(36).substr(2,6), firstname: firstname.value.trim(), lastname: lastname.value.trim(), phone: phone.value.trim(), subject: subject.value.trim(), birthdate: birthdate.value, address: address.value.trim(), notes: notes.value.trim(), imageBase64: currentImageBase64 }; if(editModeId) { const idx = teachersArray.findIndex(t => t.id === editModeId); if(idx !== -1) teachersArray[idx] = data; else teachersArray.push(data); alert("Yangilandi"); } else { teachersArray.unshift(data); alert("Qo‘shildi"); } saveToStorage(); renderTeacherList(); resetForm(); }
    async function startCamera() { if(currentStream) currentStream.getTracks().forEach(t => t.stop()); try { const stream = await navigator.mediaDevices.getUserMedia({ video: true }); currentStream = stream; video.srcObject = stream; await video.play(); snapBtn.disabled = false; } catch(err) { alert("Kamera xatosi"); } }
    function capturePhoto() { if(!video.srcObject) return; const canvas = document.createElement('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight; canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height); currentImageBase64 = canvas.toDataURL('image/jpeg',0.85); previewPhoto.src = currentImageBase64; saveBtn.disabled = false; }
    function resetImage() { currentImageBase64 = null; previewPhoto.src = ''; saveBtn.disabled = true; if(editModeId) resetForm(); }
    startCamBtn.onclick = startCamera; snapBtn.onclick = capturePhoto; resetImgBtn.onclick = resetImage; saveBtn.onclick = saveOrUpdate; clearBtn.onclick = resetForm; loadTeachers();
    window.onbeforeunload = () => { if(currentStream) currentStream.getTracks().forEach(t => t.stop()); };
</script>
</body>
</html>
